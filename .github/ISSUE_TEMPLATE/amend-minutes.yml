name: Request Minutes Amendment
description: File a request to correct or amend generated meeting minutes.
title: "[Amendment]: "
labels: ["amendment-request"]
body:
  - type: markdown
    attributes:
      value: |
        Use this form to submit corrections or amendments for a specific session's meeting minutes.
  - type: input
    id: session_selector
    attributes:
      label: Session Selector
      description: "Session identifier to amend (e.g., '125:6LO' for IETF 125 6LO session, or '2026-07-08:CBOR' for interim)."
      placeholder: "125:6LO"
    validations:
      required: true
  - type: textarea
    id: comments
    attributes:
      label: Correction Details
      description: "Describe the specific corrections, additions, or amendments to be applied to the minutes."
      placeholder: "Specify speaker names, decision corrections, or transcript additions..."
    validations:
      required: true
