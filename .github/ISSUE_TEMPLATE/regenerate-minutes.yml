name: Regenerate minutes
description: Force deletion and regeneration of generated minutes for one or more sessions
title: "Regenerate: "
body:
  - type: markdown
    attributes:
      value: |
        Filing this issue does nothing on its own. Regeneration starts when
        someone with write access applies the **`regenerate-minutes`** label,
        which deletes the cached artifacts for the sessions listed below and
        re-runs the generation pipeline to rebuild them.

  - type: textarea
    id: sessions
    attributes:
      label: Sessions
      description: |
        One selector per line. Same syntax as `--summarize`:

        | Selector | Meaning |
        | --- | --- |
        | `125:6LO` | one WG at IETF 125 |
        | `125` | every session at IETF 125 |
        | `current` | the current/upcoming IETF meeting |
        | `2026-07-08:CBOR` | one interim |
        | `2026-07-08` | all interims on that date |
        | `2026-07-01+` | all interims from that date through today |
        | `2026-06-01-2026-07-01` | all interims in a date range |
      placeholder: |
        125:6LO
        2026-07-08:CBOR
    validations:
      required: true

  - type: dropdown
    id: cache_type
    attributes:
      label: What to delete
      description: |
        **minutes** re-runs the LLM against the transcript already in the
        cache — use this when the summary is bad. **all** also drops the
        transcript and audio, forcing a re-download and re-transcribe — use
        this when the transcript itself is wrong or was truncated. It is
        much slower and costs more.
      options:
        - minutes
        - all
      default: 0
    validations:
      required: true

  - type: textarea
    id: why
    attributes:
      label: Why (optional)
      description: What's wrong with the current output?
    validations:
      required: false
