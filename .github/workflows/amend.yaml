name: Amend minutes on issue approval

on:
  issues:
    types:
      - labeled

env:
  TRANSCRIPT_GEN_FLAG: ${{ vars.TRANSCRIPT_GEN_FLAG }}
  IGNORE_FAILURES_FLAG: ${{ vars.IGNORE_FAILURES_FLAG }}

concurrency:
  group: ${{ github.workflow }}

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

jobs:
  amend-and-deploy:
    if: github.event.label.name == 'approved'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Parse issue body for selector and comments
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const os = require('os');
            const path = require('path');

            const body = context.payload.issue.body || '';

            function getSectionContent(headerName) {
              const regex = new RegExp(`###\\s*${headerName}\\s*\\n+([\\s\\S]*?)(?=\\n+###|$)`, 'i');
              const match = body.match(regex);
              return match ? match[1].trim() : '';
            }

            const selector = getSectionContent('Session Selector');
            const comments = getSectionContent('Correction Details');

            if (!selector) {
              core.setFailed('Could not parse Session Selector from issue body');
              return;
            }

            // Validate selector format strictly: NUMBER:GROUP (e.g. 125:6LO) or YYYY-MM-DD:GROUP (e.g. 2026-07-08:CBOR)
            const selectorRegex = /^(\d+|\d{4}-\d{2}-\d{2}):[A-Za-z0-9_-]+$/;
            if (!selectorRegex.test(selector)) {
              core.setFailed(`Invalid Session Selector format "${selector}". Expected NUMBER:GROUP or YYYY-MM-DD:GROUP`);
              return;
            }

            if (!comments) {
              core.setFailed('Could not parse Correction Details from issue body');
              return;
            }

            const runnerTemp = process.env.RUNNER_TEMP || os.tmpdir();
            const tempDir = fs.mkdtempSync(path.join(runnerTemp, 'amend-comments-'));
            const commentsPath = path.join(tempDir, 'comments.txt');
            fs.writeFileSync(commentsPath, comments, 'utf-8');

            core.setOutput('selector', selector);
            core.setOutput('comments_path', commentsPath);
            core.info(`Parsed selector: ${selector}`);
            core.info(`Saved comments to: ${commentsPath}`);

      - name: Setup Node.js (lts)
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Update apt and install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y --fix-missing ffmpeg

      - name: Checkout ekr/auto-minutes into ./auto-minutes
        uses: actions/checkout@v4
        with:
          repository: ekr/auto-minutes
          path: auto-minutes
          fetch-depth: 0

      - name: Install npm dependencies in auto-minutes
        working-directory: auto-minutes
        run: |
          npm ci

      - name: Checkout ietf-minutes/ietf-minutes-data (cache branch) inside auto-minutes
        uses: actions/checkout@v4
        with:
          repository: ietf-minutes/ietf-minutes-data
          ref: cache
          path: auto-minutes/cache
          fetch-depth: 0

      - name: Amend requested session
        working-directory: auto-minutes
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DEEPGRAM_API_KEY: ${{ secrets.DEEPGRAM_API_KEY }}
          SELECTOR: ${{ steps.parse.outputs.selector }}
          COMMENTS_PATH: ${{ steps.parse.outputs.comments_path }}
        run: |
          node src/index.js -v --amend "$SELECTOR" --comments "$COMMENTS_PATH" ${{ env.TRANSCRIPT_GEN_FLAG }} ${{ env.IGNORE_FAILURES_FLAG }}

      - name: Commit new/changed .md files back to cache branch
        working-directory: auto-minutes/cache
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/ietf-minutes/ietf-minutes-data.git
          git add -A output transcripts || true

          if git diff --cached --quiet; then
            echo "No markdown changes to commit"
            exit 0
          fi

          COMMIT_MSG="auto-minutes: apply amendment from issue #${{ github.event.issue.number }} ($(date -u +'%Y-%m-%d %H:%M:%S UTC'))"
          git commit -m "$COMMIT_MSG" || true
          git push origin HEAD

      - name: Generate the MD files
        working-directory: auto-minutes
        run: |
          node src/index.js -v --output

      - name: Build the site
        working-directory: auto-minutes
        run: |
          node src/index.js -v --build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'auto-minutes/_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Post status comment on issue
        uses: actions/github-script@v7
        env:
          SELECTOR: ${{ steps.parse.outputs.selector }}
        with:
          script: |
            const selector = process.env.SELECTOR;
            const issueNumber = context.issue.number;
            const commentBody = `✅ **Minutes Amended & Published**\n\nThe requested amendments for session selector \`${selector}\` have been processed, committed to the cache branch, and deployed to GitHub Pages.`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: commentBody
            });
