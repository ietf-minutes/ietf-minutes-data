name: Regenerate minutes from issue

# File an issue listing the sessions to rebuild, then apply the
# "regenerate-minutes" label. This workflow deletes the cached artifacts for
# those sessions and re-runs the normal generation pipeline to fill the gaps
# back in. Labeling is restricted to users with write access, which is what
# gates this workflow.

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  issues: write
  pages: write
  id-token: write

jobs:
  parse:
    # Applying the label is the authorization check: only users with write
    # access to the repo can label an issue. The issue template deliberately
    # does not apply the label itself, so anyone filing an issue cannot
    # self-trigger a run. Keep it that way.
    if: github.event.label.name == 'regenerate-minutes'
    runs-on: ubuntu-latest
    outputs:
      selectors: ${{ steps.parse.outputs.selectors }}
      uncache_type: ${{ steps.parse.outputs.uncache_type }}
    steps:
      - name: Parse selectors out of the issue body
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const body = (context.payload.issue.body || '').replace(/\r/g, '');

            // Group the body by markdown heading. Issue forms render one
            // heading per field; a hand-written issue just lands in "_".
            const sections = { _: [] };
            let current = '_';
            for (const line of body.split('\n')) {
              const heading = line.match(/^#{1,6}\s+(.*)$/);
              if (heading) {
                current = heading[1].trim().toLowerCase();
                sections[current] = [];
              } else {
                sections[current].push(line);
              }
            }
            const section = (re) => {
              const key = Object.keys(sections).find((k) => k !== '_' && re.test(k));
              return key ? sections[key] : null;
            };

            const clean = (lines) => lines
              .map((l) => l.trim())
              .filter((l) => l && l !== '_No response_' && !l.startsWith('```') && !l.startsWith('<!--'));

            // "What to delete" field; default to minutes only.
            const typeLines = clean(section(/delete|cache|type/) || []);
            const typeText = (typeLines[0] || '').toLowerCase();
            const uncacheType = /\ball\b|everything|audio|re-?transcribe/.test(typeText)
              ? 'all'
              : 'minutes';

            // Where the selectors live, most explicit source first:
            //   1. the issue form's "Sessions" field
            //   2. a fenced code block in a hand-written issue
            //   3. the whole body
            // The first two are authoritative, so anything unparseable in them
            // is an error. (3) is prose, so unrecognised words are ignored.
            const fenced = [...body.matchAll(/```[^\n]*\n([\s\S]*?)```/g)]
              .flatMap((m) => m[1].split('\n'));
            const sessionField = section(/session|selector|minute|regenerat/);
            const strict = !!(sessionField || fenced.length);
            const source = sessionField || (fenced.length ? fenced : body.split('\n'));

            const raw = clean(source)
              .flatMap((l) => l.replace(/^[-*]\s*/, '').split(/[,\s]+/))
              .map((s) => s.replace(/[`.,;]/g, '').trim())
              .filter(Boolean);

            // Same selector grammar auto-minutes accepts for --summarize /
            // --uncache. Validating here keeps arbitrary issue text from
            // reaching the runner.
            const DATE = '\\d{4}-\\d{2}-\\d{2}';
            const VALID = new RegExp(
              `^(current|\\d{1,4}|${DATE}\\+?|${DATE}-${DATE})(:[A-Za-z0-9._-]+)?$`
            );

            const selectors = [...new Set(strict ? raw : raw.filter((s) => VALID.test(s)))];
            const bad = selectors.filter((s) => !VALID.test(s));
            if (bad.length || selectors.length === 0) {
              const msg = selectors.length === 0
                ? 'I could not find any session selectors in this issue.'
                : `These are not valid session selectors: ${bad.map((b) => '`' + b + '`').join(', ')}`;
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: context.payload.issue.number,
                body: [
                  `${msg}`,
                  '',
                  'Expected one selector per line, e.g.:',
                  '',
                  '```',
                  '125:6LO              # one WG at IETF 125',
                  '125                  # every session at IETF 125',
                  'current              # the current/upcoming IETF meeting',
                  '2026-07-08:CBOR      # one interim',
                  '2026-07-01+          # all interims from that date to today',
                  '2026-06-01-2026-07-01  # all interims in a range',
                  '```',
                  '',
                  'Fix the issue body and re-apply the `regenerate-minutes` label.',
                ].join('\n'),
              });
              core.setFailed(msg);
              return;
            }

            core.setOutput('selectors', selectors.join('\n'));
            core.setOutput('uncache_type', uncacheType);
            core.notice(`Regenerating (${uncacheType}): ${selectors.join(', ')}`);

  regenerate:
    needs: parse
    # Reuses the normal sync pipeline so there is exactly one definition of
    # how minutes get built and published.
    uses: ./.github/workflows/sync.yaml
    with:
      selectors: ${{ needs.parse.outputs.selectors }}
      uncache_type: ${{ needs.parse.outputs.uncache_type }}
    secrets: inherit

  report:
    needs: [parse, regenerate]
    if: always() && needs.parse.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        env:
          SELECTORS: ${{ needs.parse.outputs.selectors }}
          UNCACHE_TYPE: ${{ needs.parse.outputs.uncache_type }}
          RESULT: ${{ needs.regenerate.result }}
        with:
          script: |
            const ok = process.env.RESULT === 'success';
            const list = process.env.SELECTORS.split('\n').map((s) => `- \`${s}\``).join('\n');
            const run = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.payload.issue.number,
              body: ok
                ? `Deleted (\`${process.env.UNCACHE_TYPE}\`) and regenerated:\n\n${list}\n\nThe site has been rebuilt and deployed. ([run](${run}))`
                : `Regeneration **failed** (\`${process.env.RESULT}\`) for:\n\n${list}\n\nThe cache branch was left untouched. See the [run log](${run}).`,
            });
            if (ok) {
              await github.rest.issues.update({
                ...context.repo,
                issue_number: context.payload.issue.number,
                state: 'closed',
                state_reason: 'completed',
              });
            }
