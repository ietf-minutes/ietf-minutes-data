name: Regenerate minutes from issue

# File an issue listing the sessions to rebuild, then apply the
# "regenerate-minutes" label. This workflow deletes the cached artifacts for
# those sessions and re-runs the normal generation pipeline to fill the gaps
# back in. Labeling is restricted to users with write access, which is what
# gates this workflow.

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  issues: write
  pages: write
  id-token: write

jobs:
  parse:
    # Applying the label is the authorization check: only users with write
    # access to the repo can label an issue. The issue template deliberately
    # does not apply the label itself, so anyone filing an issue cannot
    # self-trigger a run. Keep it that way.
    if: github.event.label.name == 'regenerate-minutes'
    runs-on: ubuntu-latest
    outputs:
      selectors: ${{ steps.parse.outputs.selectors }}
    steps:
      - name: Parse selectors out of the issue body
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const body = (context.payload.issue.body || '').replace(/\r/g, '');

            // One selector per line, with an optional "minutes" (default) or
            // "all" after whitespace:
            //
            //   125:6LO
            //   2026-07-08:CBOR all
            //
            // Anything that doesn't look like a selector line is prose and is
            // ignored, so you can explain yourself in the same issue.
            const DATE = '\\d{4}-\\d{2}-\\d{2}';
            const SELECTOR = new RegExp(
              `^(current|\\d{1,4}|${DATE}\\+?|${DATE}-${DATE})(:[A-Za-z0-9._-]+)?$`
            );

            const selectors = [];
            const errors = [];
            const seen = new Set();

            for (const line of body.split('\n')) {
              // Tolerate list bullets and backticks; the content is the same.
              const text = line.trim().replace(/^[-*]\s+/, '').replace(/`/g, '').trim();
              if (!text || text.startsWith('#') || text.startsWith('>')) continue;

              const [selector, type, ...rest] = text.split(/\s+/);
              if (!SELECTOR.test(selector)) continue; // prose

              if (rest.length) {
                errors.push(`\`${text}\` — expected at most "<selector> minutes|all"`);
              } else if (type && type !== 'minutes' && type !== 'all') {
                // Don't silently fall back to minutes: a typo here would
                // quietly skip the re-transcribe the filer asked for.
                errors.push(`\`${text}\` — \`${type}\` is not \`minutes\` or \`all\``);
              } else if (!seen.has(selector)) {
                seen.add(selector);
                selectors.push(`${selector} ${type || 'minutes'}`);
              }
            }

            if (errors.length || selectors.length === 0) {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: context.payload.issue.number,
                body: [
                  errors.length
                    ? `I couldn't parse these lines:\n\n${errors.map((e) => `- ${e}`).join('\n')}`
                    : "I couldn't find any session selectors in this issue.",
                  '',
                  'One selector per line, optionally followed by `minutes` (the',
                  'default — re-run the LLM over the cached transcript) or `all`',
                  '(also drop the transcript and audio and re-transcribe):',
                  '',
                  '```',
                  '125:6LO                    one WG at IETF 125',
                  '125                        every session at IETF 125',
                  'current                    the current/upcoming IETF meeting',
                  '2026-07-08:CBOR all        one interim, re-transcribed',
                  '2026-07-08                 all interims on that date',
                  '2026-07-01+                all interims from that date to today',
                  '2026-06-01-2026-07-01      all interims in a range',
                  '```',
                  '',
                  'Fix the issue body, then remove and re-apply the',
                  '`regenerate-minutes` label.',
                ].join('\n'),
              });
              core.setFailed(errors.length ? 'Unparseable selector lines' : 'No selectors found');
              return;
            }

            core.setOutput('selectors', selectors.join('\n'));
            core.notice(`Regenerating:\n${selectors.join('\n')}`);

  regenerate:
    needs: parse
    # Reuses the normal sync pipeline so there is exactly one definition of
    # how minutes get built and published.
    uses: ./.github/workflows/sync.yaml
    with:
      selectors: ${{ needs.parse.outputs.selectors }}
    secrets: inherit

  report:
    needs: [parse, regenerate]
    if: always() && needs.parse.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        env:
          SELECTORS: ${{ needs.parse.outputs.selectors }}
          RESULT: ${{ needs.regenerate.result }}
        with:
          script: |
            const ok = process.env.RESULT === 'success';
            const list = process.env.SELECTORS.split('\n').map((s) => `- \`${s}\``).join('\n');
            const run = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.payload.issue.number,
              body: ok
                ? `Deleted and regenerated:\n\n${list}\n\nThe site has been rebuilt and deployed. ([run](${run}))`
                : `Regeneration **failed** (\`${process.env.RESULT}\`) for:\n\n${list}\n\nThe cache branch was left untouched. See the [run log](${run}).`,
            });
            if (ok) {
              await github.rest.issues.update({
                ...context.repo,
                issue_number: context.payload.issue.number,
                state: 'closed',
                state_reason: 'completed',
              });
            }
