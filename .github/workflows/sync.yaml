name: Checkout auto-minutes and npm install (use cache branch)

on:
  workflow_dispatch:
    inputs:
      selectors:
        description: 'One per line: "<selector> [minutes|all]", e.g. "125:6LO" or "2026-07-08:CBOR all". Empty = normal sync.'
        required: false
        type: string
  push:
    branches:
      - main
      - cache
  schedule:
    - cron: '*/15 * * * *'

env:
  TRANSCRIPT_GEN_FLAG: ${{ vars.TRANSCRIPT_GEN_FLAG }}

concurrency:
  group: ${{ github.workflow }}

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  setup-and-checkout:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Setup Node.js (lts)
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Update apt and install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y --fix-missing ffmpeg

      - name: Checkout ekr/auto-minutes into ./auto-minutes
        uses: actions/checkout@v4
        with:
          repository: ekr/auto-minutes
          path: auto-minutes
          fetch-depth: 0

      - name: What is the current git version
        working-directory: auto-minutes
        run: |
          git log -n 1

      - name: Install npm dependencies in auto-minutes
        working-directory: auto-minutes
        run: |
          npm ci

      - name: Checkout ietf-minutes/ietf-minutes-data (cache branch) inside auto-minutes
        uses: actions/checkout@v4
        with:
          repository: ietf-minutes/ietf-minutes-data
          ref: cache
          path: auto-minutes/cache
          fetch-depth: 0

      # Forced-regeneration path: drop the cached artifacts for the requested
      # sessions so the summarize step below has to build them from scratch.
      #
      # Each line is "<selector> [minutes|all]". "minutes" drops just the
      # cached summary, so the LLM re-runs over the transcript already in the
      # cache branch. "all" additionally drops the transcript and audio,
      # forcing a re-download from Meetecho and a re-transcribe.
      - name: Uncache requested sessions
        if: inputs.selectors != ''
        working-directory: auto-minutes
        env:
          # Via env, never inlined into the script: this is caller-supplied
          # dispatch input.
          SELECTORS: ${{ inputs.selectors }}
        run: |
          set -euo pipefail
          while read -r selector type; do
            [ -z "$selector" ] && continue
            echo "::group::uncache $selector (${type:-minutes})"
            node src/index.js -v --uncache "$selector" --uncache-type "${type:-minutes}"
            echo "::endgroup::"
          done <<< "$SELECTORS"

      - name: Summarize the current meeting
        if: inputs.selectors == ''
        working-directory: auto-minutes
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DEEPGRAM_API_KEY: ${{ secrets.DEEPGRAM_API_KEY }}
        run: |
          node src/index.js -v --summarize current --source agenda -j 5 ${{ env.TRANSCRIPT_GEN_FLAG }}

      - name: Summarize interims up to today.
        if: inputs.selectors == ''
        working-directory: auto-minutes
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DEEPGRAM_API_KEY: ${{ secrets.DEEPGRAM_API_KEY }}
        run: |
          # Performance isn't good if we start too far back, unfortunately.
          node src/index.js -v --summarize 2026-07-01+ --source agenda -j 5 ${{ env.TRANSCRIPT_GEN_FLAG }}

      - name: Summarize requested sessions
        if: inputs.selectors != ''
        working-directory: auto-minutes
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DEEPGRAM_API_KEY: ${{ secrets.DEEPGRAM_API_KEY }}
          SELECTORS: ${{ inputs.selectors }}
        run: |
          set -euo pipefail
          while read -r selector _type; do
            [ -z "$selector" ] && continue
            echo "::group::summarize $selector"
            node src/index.js -v --summarize "$selector" --source agenda -j 5 ${{ env.TRANSCRIPT_GEN_FLAG }}
            echo "::endgroup::"
          done <<< "$SELECTORS"

      - name: Commit new/changed .md files back to cache branch
        working-directory: auto-minutes/cache
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Configure git user
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Ensure the origin remote will accept the workflow push using the GITHUB_TOKEN
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/ietf-minutes/ietf-minutes-data.git

          # Stage adds, changes *and* deletions under the two tracked trees.
          # Scoped to these paths so the (large, untracked) cache/audio
          # directory stays out of the branch.
          git add -A output transcripts || true

          # If there are no staged changes, exit quickly
          if git diff --cached --quiet; then
            echo "No markdown changes to commit"
            exit 0
          fi

          # Commit staged changes and push back to the cache branch
          COMMIT_MSG="auto-minutes: add/update generated summaries ($(date -u +'%Y-%m-%d %H:%M:%S UTC'))"
          git commit -m "$COMMIT_MSG" || true
          # Push to the current branch (cache)
          git push origin HEAD

      - name: Generate the MD files
        working-directory: auto-minutes
        run: |
          node src/index.js -v --output

      - name: Build the site
        working-directory: auto-minutes
        run: |
          node src/index.js -v --build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repository
          path: 'auto-minutes/_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
